<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweety AI</title>
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/11516/11516246.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/11516/11516246.png" />
  </head>
  <body>
    <div id="root">
      <style>
        body { background: #060413; margin: 0; padding: 0; overflow: hidden; }
        .initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #060413;
          color: white;
          font-family: sans-serif;
          z-index: 9999;
        }
        .spinner {
          width: 48px;
          height: 48px;
          border: 4px solid rgba(99, 102, 241, 0.2);
          border-top: 4px solid #6366f1;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 20px;
        }
        .text {
          font-size: 14px;
          font-weight: 600;
          letter-spacing: 0.1em;
          color: #818cf8;
          text-transform: uppercase;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="text">XPRO AGENT IS LOADING...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
